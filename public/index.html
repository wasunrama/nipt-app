      const KNOWLEDGE_BASE = {
        "NIPT คืออะไร": `NIPT (Non-Invasive Prenatal Testing) คือการตรวจคัดกรองโครโมโซมของทารกในครรภ์ โดยการวิเคราะห์ cell-free fetal DNA (cffDNA) ที่ลอยอยู่ในกระแสเลือดมารดา
**วิธีการตรวจ:** เจาะเลือดมารดาเพียง 10 ml ไม่มีความเสี่ยงต่อทารก
**สามารถตรวจพบ:**
- Trisomy 21, 18, 13
- Sex chromosome abnormalities
- บางแพ็กเกจรวม microdeletions
**ช่วงเวลาที่เหมาะสม:** ตั้งแต่อายุครรภ์ 10 สัปดาห์ขึ้นไป
⚠️ **สำคัญ:** NIPT เป็น screening test ไม่ใช่ diagnostic test ผลผิดปกติต้องยืนยันด้วย invasive testing`,

        "พื้นฐานชีววิทยา: fetal fraction และ cell-free DNA": `**Cell-free DNA และ Fetal Fraction**
NIPT อาศัยการวิเคราะห์ชิ้นส่วน DNA อิสระ (cell-free DNA) ในพลาสมาของมารดา ซึ่งประกอบด้วย:
- **DNA ของมารดา** เป็นส่วนใหญ่
- **DNA จากรก (placenta-derived cfDNA)** ซึ่งใช้เป็นตัวแทนของทารกทางอ้อม
⚠️ **ข้อควรเข้าใจ:** cfDNA ที่วิเคราะห์ใน NIPT ส่วนใหญ่เป็น placenta-derived DNA ไม่ใช่ DNA ของตัวทารกโดยตรงทั้งหมด
**Fetal Fraction คืออะไร:**
สัดส่วนของ cfDNA ที่มาจากรกต่อ cfDNA ทั้งหมดในพลาสมา
- เป็นตัวแปรสำคัญต่อความเชื่อมั่นและความแม่นยำของผล
- ค่าขั้นต่ำที่ยอมรับได้คือ ≥4%
- เมื่อ fetal fraction ต่ำ โอกาสเกิด no-call, inconclusive หรือ false negative เพิ่มขึ้นอย่างมีนัยสำคัญ`,

        "ปัจจัยที่มีผลต่อ fetal fraction": `**ปัจจัยที่ทำให้ Fetal Fraction เปลี่ยนแปลง**
Fetal fraction ไม่คงที่ ขึ้นกับปัจจัยหลายประการ:
**ปัจจัยที่ทำให้ fetal fraction เพิ่มขึ้น:**
- อายุครรภ์มากขึ้น (โดยเฉพาะหลัง 10 สัปดาห์)
**ปัจจัยที่ทำให้ fetal fraction ลดลง:**
- BMI สูง / น้ำหนักตัวมาก (maternal cfDNA เจือปนมาก)
- ครรภ์แฝด
- การตั้งครรภ์จาก IVF
- ยาบางชนิด
- ภาวะภูมิคุ้มกันผิดปกติ
- ความผิดปกติของรก
**ผลที่ตามมาเมื่อ fetal fraction ต่ำ:**
- โอกาสได้ผล no-call หรือ inconclusive สูงขึ้น
- ความแม่นยำของผลลดลง
- เพิ่มความเสี่ยง false negative
💡 **แนวทาง:** ก่อนส่งตรวจ ควรประเมิน BMI, อายุครรภ์ และปัจจัยเสี่ยงที่อาจทำให้ fetal fraction ต่ำ`,

        "ผล High Risk หมายความว่าอะไร": `ผล **High Risk** หมายความว่า พบสัญญาณของ chromosomal abnormality ในตัวอย่างเลือด
**สิ่งที่ต้องเข้าใจ:**
- ❌ ไม่ได้หมายความว่าทารกผิดปกติแน่นอน
- ✅ หมายความว่าควรตรวจยืนยันด้วย invasive testing
**Positive Predictive Value (PPV):**
- Trisomy 21: PPV ~90% (ขึ้นกับอายุมารดา)
- Trisomy 18: PPV ~70-80%
- Trisomy 13: PPV ~40-50%
**ขั้นตอนต่อไป:**
1. พบแพทย์เพื่อปรึกษาผล
2. พิจารณา amniocentesis หรือ CVS
3. รับคำปรึกษาจาก genetic counselor
💙 ผล high risk ก่อให้เกิดความวิตกกังวล — ควรขอความช่วยเหลือด้านจิตใจด้วย`,

        "ผล No Call / Inconclusive คืออะไร": `**ผล No-Call / Inconclusive / Non-Reportable หมายความว่าอะไร**
ผลลักษณะนี้หมายถึงห้องปฏิบัติการ**ไม่สามารถออกรายงานอย่างมั่นใจได้**
**สาเหตุที่พบบ่อย:**
- **Fetal fraction ต่ำ** — พบบ่อยที่สุด
- ปัญหาก่อนวิเคราะห์: เก็บตัวอย่างไม่เหมาะสม, ขนส่งล่าช้า, ตัวอย่างเสื่อมสภาพ
- ปัญหาระหว่างวิเคราะห์: extraction failure, library failure, sequencing failure
- ปัญหาหลังวิเคราะห์: คุณภาพข้อมูลไม่ผ่านเกณฑ์ หรือ algorithm สรุปผลไม่ได้
**แนวทางจัดการ:**
1. ทบทวนสาเหตุร่วมกับแพทย์
2. ประเมิน ultrasound ประกอบ
3. พิจารณาเจาะเลือดซ้ำหลัง 2 สัปดาห์
4. หาก no-call ซ้ำหรือ ultrasound ผิดปกติ — พิจารณา invasive testing โดยตรง
⚠️ **สำคัญ:** ผล no-call ไม่ได้แปลว่าทารกปกติ บางกรณีสัมพันธ์กับความเสี่ยง aneuploidy ที่สูงกว่าประชากรทั่วไป`,

        "Sensitivity, Specificity และ Residual Risk": `**ความเข้าใจเชิงสถิติสำหรับ NIPT**
**Sensitivity:** ความสามารถตรวจพบรายที่ผิดปกติจริง
**Specificity:** ความสามารถแยกรายที่ปกติจริง
**PPV (Positive Predictive Value):** เมื่อผลบวก โอกาสที่ทารกจะผิดปกติจริง
**NPV (Negative Predictive Value):** เมื่อผลลบ โอกาสที่ทารกจะปกติจริง
⚠️ **จุดสำคัญ:** PPV เปลี่ยนแปลงตามความชุกของโรคและ prior risk ของผู้ตั้งครรภ์ ผล high-risk จึงไม่ได้มีความหมายเท่ากันในทุกคน
**Residual Risk:**
ผล "ความเสี่ยงต่ำ" ยังมี residual risk เหลืออยู่เสมอ — ไม่ใช่การรับประกัน 100%
**ค่าโดยประมาณ:**
| ภาวะ | Sensitivity | Specificity | PPV (อายุ >35 ปี) |
|------|-------------|-------------|-------------------|
| T21 | >99% | >99.9% | ~90% |
| T18 | ~97% | >99.9% | ~70-80% |
| T13 | ~90% | >99.9% | ~40-50% |
📌 NIPT คือ screening ไม่ใช่ diagnosis — การตัดสินใจทางคลินิกต้องไม่อาศัยผล NIPT เพียงอย่างเดียว`,

        "เหตุใด T21/T18/T13 แม่นยำกว่า SCA": `**ทำไม Trisomy 21/18/13 จึงแม่นยำกว่า Sex Chromosome Aneuploidies**
**กลุ่ม Autosomal Trisomy (T21, T18, T13) มีข้อได้เปรียบหลายประการ:**
- ฐานข้อมูลสะสมมากกว่า
- รูปแบบสัญญาณทางชีวสถิติชัดเจนกว่า
- กรอบการตีความทางคลินิกตรงไปตรงมากว่า
**กลุ่ม SCA มีความท้าทายมากกว่า:**
- ความชุกของโรคต่ำกว่า → PPV ต่ำกว่า
- ภาวะ mosaicism พบบ่อยกว่า
- Maternal mosaicism หรือ maternal sex chromosome abnormality แทรกซ้อน
- Phenotype แปรผันกว้างมาก
- **Monosomy X** มี false positive สูงเป็นพิเศษ และ PPV ต่ำที่สุดในกลุ่มนี้
💡 **ข้อแนะนำ:** หาก NIPT รายงาน SCA ควรปรึกษา genetic counselor ก่อนตัดสินใจทางคลินิก และยืนยันด้วย invasive testing เสมอ`,

        "Trisomy 21 (Down syndrome)": `**Down Syndrome (Trisomy 21)**
**พันธุกรรม:** โครโมโซมคู่ที่ 21 เกินมา 1 แท่ง (47 แท่งแทน 46 แท่ง)
**ความถี่:** ~1/700 การคลอด (เพิ่มตามอายุมารดา)
**ลักษณะทางคลินิก:**
- ระดับสติปัญญาต่ำกว่าปกติ (mild-moderate)
- ลักษณะหน้าตาเฉพาะ
- โรคหัวใจพิการแต่กำเนิด ~40-50%
- ความเสี่ยงต่อมะเร็งเม็ดเลือดขาวสูงขึ้น
**อายุขัย:** ปัจจุบันมักมีชีวิตยืนยาวถึง 60+ ปี
**NIPT Sensitivity:** >99% | **Specificity:** >99.9%
📌 การวินิจฉัยยืนยันต้องทำ karyotype จาก amniocentesis หรือ CVS`,

        "Amniocentesis คืออะไร": `**Amniocentesis** คือการเจาะดูดน้ำคร่ำเพื่อตรวจโครโมโซมทารก
**วิธีการ:**
- ใช้เข็มเจาะผ่านหน้าท้องมารดาภายใต้ ultrasound guidance
- ดูดน้ำคร่ำ ~15-20 ml
- ส่งตรวจ karyotype / microarray / FISH
**เวลาที่เหมาะ:** อายุครรภ์ 15-20 สัปดาห์
**ผลการตรวจ:**
- Karyotype: 2-3 สัปดาห์
- FISH/QF-PCR: 2-3 วัน (โครโมโซมหลัก)
**ความเสี่ยง:**
- แท้งบัตร ~0.1-0.3% (1/500-1000)
- Infection, bleeding (พบน้อยมาก)
**ความแม่นยำ:** ~99.5% สำหรับ chromosomal abnormalities`,

        "บทบาทของ Ultrasound ในการคัดกรอง": `**Ultrasound: องค์ประกอบสำคัญของการคัดกรองก่อนคลอด**
Ultrasound ไม่ได้เป็นเพียงการตรวจเสริม แต่เป็น**ส่วนสำคัญที่ขาดไม่ได้**ของระบบการคัดกรองก่อนคลอด
**บทบาทของ Ultrasound:**
- ยืนยันอายุครรภ์และจำนวนทารก
- ยืนยันการมีชีวิตของทารก
- ตรวจความผิดปกติทางกายวิภาค
- ประเมินสัญญาณที่อาจบ่งชี้โครโมโซมผิดปกติ (เช่น nuchal translucency)
**กรณีที่ต้องระวังเป็นพิเศษ:**
- หาก ultrasound พบความผิดปกติชัดเจน → ผล NIPT "ความเสี่ยงต่ำ" ไม่ควรใช้ยุติการสืบค้น เพราะ NIPT ไม่ครอบคลุมความผิดปกติทุกชนิด
- หาก NIPT ผลบวก → ควรทำ detailed ultrasound และยืนยันด้วย invasive testing ก่อนตัดสินใจทางคลินิก
📌 การใช้ NIPT และ Ultrasound ร่วมกันให้ประสิทธิภาพการคัดกรองที่ดีที่สุด`,

        "ตรวจได้ตั้งแต่กี่สัปดาห์": `**ช่วงเวลาที่เหมาะสมสำหรับ NIPT**
**อายุครรภ์ขั้นต่ำ:** 10 สัปดาห์ (บางแล็บ 9 สัปดาห์)
**เหตุผล:** ต้องการ fetal fraction ≥4% จึงจะแปลผลได้น่าเชื่อถือ
- Fetal fraction เพิ่มขึ้นตามอายุครรภ์
- ที่ 10 สัปดาห์: fetal fraction ~10%
- ที่ 20 สัปดาห์: fetal fraction ~20%
**ช่วงที่ดีที่สุด:** 10-13 สัปดาห์ (ร่วมกับ first trimester screening)
**กรณี No Call:** อาจเกิดจาก fetal fraction ต่ำเกินไป ควรตรวจซ้ำหลัง 2 สัปดาห์
**ไม่มีอายุครรภ์สูงสุด** — ตรวจได้ตลอดการตั้งครรภ์`,

        "สาเหตุของ false positive ใน NIPT": `**สาเหตุของ False Positive ใน NIPT**
False positive หมายถึงผลบ่งชี้ความเสี่ยงสูง แต่ทารกจริงปกติ
**สาเหตุที่พบ:**
- **Confined Placental Mosaicism (CPM):** รกมีโครโมโซมผิดปกติ แต่ทารกจริงปกติ (พบบ่อยที่สุด)
- **Vanishing Twin:** DNA จากครรภ์ที่หยุดพัฒนายังหลั่งเข้ากระแสเลือดมารดาได้อีกหลายสัปดาห์
- **Maternal Mosaicism:** มารดามีโครโมโซมผิดปกติในระดับ mosaicism
- **Maternal Copy-Number Variation**
- **Maternal Malignancy:** เนื้องอกหรือมะเร็งของมารดาบางชนิด
- ข้อผิดพลาดทางเทคนิคหรือการวิเคราะห์ข้อมูล
**กลุ่ม SCA false positive สูงเป็นพิเศษ:**
- ความชุกต่ำ + mosaicism สูง + รบกวนจากโครโมโซมเพศมารดา → PPV ต่ำกว่า autosomal trisomies มาก โดยเฉพาะ monosomy X
⚠️ ผล high-risk ต้องยืนยันด้วย invasive testing ก่อนตัดสินใจทางคลินิกเสมอ`,

        "สาเหตุของ false negative ใน NIPT": `**สาเหตุของ False Negative ใน NIPT**
False negative หมายถึงผลบ่งชี้ความเสี่ยงต่ำ แต่ทารกจริงผิดปกติ
**สาเหตุที่พบ:**
- **Fetal fraction ต่ำ** — สำคัญที่สุด ทำให้สัญญาณความผิดปกติไม่เด่นพอ
- **Placental mosaicism ระดับต่ำ** — รกและทารกมีความไม่สอดคล้องกัน
- **ครรภ์แฝด (dizygotic twins)** — ทารกปกติอาจกลบสัญญาณจากทารกที่ผิดปกติ
- Sequencing depth ไม่เพียงพอ
- Algorithm ไม่สามารถแยกสัญญาณได้ชัดเจน
- ความผิดปกติที่อยู่นอกขอบเขตของ assay ที่ใช้
📌 **ข้อควรจำ:** ผล "ความเสี่ยงต่ำ" ไม่ใช่การยืนยันว่าทารกปกติทุกประการ แต่เป็นเพียงการลดโอกาสของความผิดปกติในขอบเขตที่การทดสอบครอบคลุม`,

        "ครรภ์แฝดและ Vanishing Twin": `**ครรภ์แฝดและ Vanishing Twin กับ NIPT**
**ครรภ์แฝด:**
- NIPT ยังมีประโยชน์ โดยเฉพาะ trisomy 21 ซึ่งมีประสิทธิภาพใกล้เคียง singleton มากกว่าการตรวจแบบ serum screening ดั้งเดิม
- ความซับซ้อนสูงกว่า: fetal fraction ของทารกแต่ละคนไม่เท่ากัน
- Dizygotic twin: ทารกปกติอาจทำให้สัญญาณจากทารกผิดปกติลดลง → เพิ่มความเสี่ยง false negative
- โอกาส test failure สูงกว่าครรภ์เดี่ยว
**Vanishing Twin:**
- เป็นสาเหตุสำคัญของ false positive
- DNA จากครรภ์ที่หยุดพัฒนายังคงหลั่งเข้าสู่กระแสเลือดมารดาได้อีกหลายสัปดาห์
- ควรซักประวัติและใช้ ultrasound ประกอบอย่างละเอียดก่อนแปลผล NIPT ในรายที่มีประวัติครรภ์แฝด`,

        "Genetic counselor คืออะไร": `**Genetic Counselor คือใคร และมีบทบาทอย่างไร**
Genetic counselor คือบุคลากรวิชาชีพที่มีความรู้ทั้งด้าน**พันธุศาสตร์การแพทย์**และ**การให้คำปรึกษา**
**บทบาทหลัก:**
- รวบรวมประวัติส่วนบุคคลและประวัติครอบครัว
- ประเมินความเสี่ยง
- อธิบายทางเลือกของการตรวจคัดกรองและการตรวจวินิจฉัย
- ช่วยแปลผลทางพันธุกรรม
- สนับสนุนให้ผู้รับบริการตัดสินใจบนพื้นฐานของข้อมูลที่ถูกต้อง
**ในบริบทสูติกรรม:**
- ให้คำปรึกษาก่อนตรวจ NIPT
- อธิบายข้อจำกัดของ NIPT และ false positive/negative/no-call
- สื่อสารผลตรวจและวางแผนการตรวจยืนยัน
- ทำงานร่วมกับสูติแพทย์ เวชศาสตร์มารดาและทารกในครรภ์ นักพันธุศาสตร์คลินิก และห้องปฏิบัติการ
💙 Genetic counselor ช่วยให้ผู้รับบริการตัดสินใจสอดคล้องกับคุณค่าและบริบทของตนเอง`,

        "การให้คำปรึกษาก่อนตรวจ NIPT": `**Pre-test Genetic Counseling สำหรับ NIPT**
ก่อนตรวจ ผู้รับบริการควรได้รับข้อมูลครบถ้วนในประเด็นต่อไปนี้:
**สิ่งที่ต้องอธิบาย:**
- NIPT เป็น screening ไม่ใช่ diagnosis
- โรคที่ตรวจพบได้ และตรวจไม่ได้
- ความเป็นไปได้ของ false positive, false negative, no-call
- ผลที่อาจพบโดยไม่คาดคิดจากมารดา (เช่น maternal malignancy)
- ทางเลือกอื่น: serum screening, ultrasound, invasive diagnostic testing
**สิทธิของผู้รับบริการ:**
- เลือกรับหรือไม่รับผลบางประเภท (เช่น SCA)
- มีเวลาตัดสินใจบนพื้นฐานของข้อมูล ไม่ใช่เพียงลงนามยินยอม
⚠️ การให้ความยินยอมควรเป็น**กระบวนการของการทำความเข้าใจ** ไม่ใช่เพียงการลงลายมือชื่อในเอกสาร`,

        "การให้คำปรึกษาหลังตรวจ (ผล Low Risk)": `**Post-test Counseling: ผล Screen Negative / Low Risk**
เมื่อผลตรวจไม่พบความเสี่ยง ควรสื่อสารอย่างสมดุลดังนี้:
**สิ่งที่ต้องอธิบาย:**
- ผลนี้คือ "screen negative" หรือ "low risk" — ช่วยลดโอกาสของความผิดปกติในขอบเขตที่ทดสอบ
- **ไม่ใช่การยืนยันว่าทารกปกติทุกประการ** — ยังคงมี residual risk เหลืออยู่
- NIPT ไม่ครอบคลุมความผิดปกติทุกชนิด
- ยังต้องติดตามครรภ์ตามมาตรฐาน โดยเฉพาะ ultrasound ตามช่วงเวลาที่เหมาะสม
💡 ควรอธิบาย residual risk อย่างสมดุล — **ไม่สร้างความตื่นตระหนก แต่ก็ไม่สร้างความมั่นใจเกินจริง**`,

        "การให้คำปรึกษาหลังตรวจ (ผล High Risk)": `**Post-test Counseling: ผล Screen Positive / High Risk**
เมื่อผลตรวจบ่งชี้ความเสี่ยงสูง ควรดำเนินการดังนี้:
**ขั้นตอนการให้คำปรึกษา:**
1. อธิบายว่าเป็นผลคัดกรองเชิงสถิติ — ไม่ใช่คำวินิจฉัย
2. ย้ำถึงค่า PPV ตามโรคและอายุมารดา
3. อธิบายความจำเป็นของการตรวจยืนยัน (CVS หรือ amniocentesis)
4. ประเมิน ultrasound ประกอบก่อนตัดสินใจ
5. สนับสนุนด้านจิตใจ — ผล high risk ก่อให้เกิดความวิตกกังวลอย่างมาก
**ทางเลือกที่ต้องนำเสนอ:**
- การตรวจยืนยันด้วย invasive testing
- การปรึกษาผู้เชี่ยวชาญเพิ่มเติม (MFM, นักพันธุศาสตร์คลินิก)
- ทางเลือกในการจัดการครรภ์หลังยืนยันผล
💙 การตัดสินใจทั้งหมดควรเป็นของผู้รับบริการ บนพื้นฐานข้อมูลที่ครบถ้วนและการสนับสนุนที่เพียงพอ`,

        "การให้คำปรึกษากรณี False Negative": `**การให้คำปรึกษากรณี False Negative**
กรณีที่ทารกเกิดมามีความผิดปกติ ทั้งที่ผล NIPT ก่อนคลอดไม่พบความเสี่ยง:
**หลักการสื่อสาร:**
- ใช้ความระมัดระวังอย่างยิ่ง — ต้องตรงไปตรงมาแต่เห็นอกเห็นใจ
- อธิบายว่า NIPT ไม่ใช่การตรวจวินิจฉัย และ false negative เกิดขึ้นได้จากข้อจำกัดทางชีววิทยาและเทคนิค
**สาเหตุที่ควรอธิบาย:**
- Fetal fraction ต่ำ
- Mosaicism
- ความแตกต่างระหว่างรกกับทารก
- ขอบเขตของการตรวจที่จำกัด
**สิ่งที่ต้องดำเนินการ:**
- ทบทวนกระบวนการตรวจ
- อธิบายข้อเท็จจริงทางวิทยาศาสตร์อย่างชัดเจน
- **ดูแลด้านจิตใจของครอบครัวเป็นสำคัญ** — ไม่ใช่เพียงอธิบายเชิงเทคนิคเท่านั้น`,

        "Informed Consent ใน NIPT": `**Informed Consent ที่ควรมีใน NIPT**
เอกสารยินยอมควรครอบคลุมอย่างน้อย 3 ประเด็นสำคัญ:
**ประเด็นที่ 1: ความเข้าใจในลักษณะของการตรวจ**
ผู้รับบริการเข้าใจว่า NIPT เป็นการตรวจคัดกรอง ไม่ใช่การตรวจวินิจฉัย
**ประเด็นที่ 2: การเลือกรับผลบางประเภท**
ผู้รับบริการประสงค์หรือไม่ประสงค์จะรับรายงานผลบางประเภท เช่น SCA หรือ incidental findings
**ประเด็นที่ 3: การนำข้อมูลไปใช้**
ผู้รับบริการยินยอมหรือไม่ยินยอมให้นำข้อมูลผลตรวจ (ที่ผ่านการตัดข้อมูลระบุตัวตนออกแล้ว) ไปใช้เพื่อการวิจัย การประกันคุณภาพ และการพัฒนาบริการ
⚠️ **หลักการสำคัญ:** การให้ความยินยอมควรเป็นกระบวนการของ**การทำความเข้าใจ** ไม่ใช่เพียงการลงลายมือชื่อในเอกสาร`,

        "NIPT กับ NGS: low-pass และ targeted library": `**เทคนิค NGS ที่ใช้ใน NIPT**
**Low-pass Whole-genome Sequencing (Massively Parallel Sequencing):**
- อ่านลำดับทั่วทั้งจีโนมในระดับความลึกต่ำ
- ใช้การนับจำนวนชิ้นส่วนอ่านจากแต่ละโครโมโซม
- เพื่อตรวจหาความไม่สมดุลของปริมาณ (copy number imbalance)
- **ข้อดี:** ครอบคลุมกว้าง ยืดหยุ่น
**Targeted / Capture Library:**
- เลือกจับเฉพาะบริเวณหรือโครโมโซมเป้าหมายก่อนอ่านลำดับ
- **ข้อดี:** ลดภาระข้อมูล เหมาะกับการออกแบบ assay เฉพาะทาง
⚠️ **ข้อควรระวัง:** ประสิทธิภาพจริงขึ้นกับ chemistry, sequencing depth, bioinformatics pipeline และการควบคุมคุณภาพของแต่ละห้องปฏิบัติการ ไม่ใช่เพียงชนิด library เพียงอย่างเดียว`,

        "เทคนิคอื่น: Vanadis, SNP-based, digital PCR": `**แพลตฟอร์มทางเลือกสำหรับ NIPT**
**Vanadis System:**
- ใช้หลัก rolling circle amplification และการนับสัญญาณเชิงดิจิทัล
- ลดการพึ่งพา PCR และ sequencing
**SNP-based NIPT:**
- ใช้ข้อมูล polymorphism เพื่อแยกสัญญาณของมารดาและทารก
- จุดเด่น: ประเมิน zygosity ในครรภ์แฝด, บางภาวะที่ NGS ทำได้ยากกว่า
**Digital PCR:**
- ศักยภาพสูงสำหรับเป้าหมายเฉพาะหรือสัญญาณปริมาณต่ำมาก
- ยังไม่ใช่แพลตฟอร์มหลักสำหรับการคัดกรอง aneuploidy แบบ routine
**การเลือกเทคโนโลยี:** ควรพิจารณาทั้งความแม่นยำ ต้นทุน TAT ความสามารถด้าน automation และบริบทของระบบบริการ`,

        "Manual vs Automation Workflow": `**Manual vs Automation Workflow ในการตรวจ NIPT**
**Manual Workflow:**
- ข้อดี: ยืดหยุ่น ต้นทุนการลงทุนเริ่มต้นต่ำกว่า
- ข้อเสีย: ความแปรปรวนระหว่างผู้ปฏิบัติงาน, เสี่ยงต่อการปนเปื้อน, คอขวดเมื่อปริมาณตัวอย่างสูง
**Automation Workflow:**
- ข้อดี: ความสม่ำเสมอสูง, ลด human error, เพิ่ม throughput, ควบคุมคุณภาพเป็นระบบ เหมาะกับงานระดับบริการขนาดใหญ่
- ข้อเสีย: ต้นทุนการลงทุนสูง
**การประเมินก่อนลงทุน Automation:**
- จำนวนตัวอย่างจริงต่อวัน
- ค่าเสื่อมราคาและค่า reagent
- TAT ที่ต้องการ
- Repeat rate และ no-call rate
- ภาระบุคลากรของห้องปฏิบัติการ`,

        "การวิเคราะห์ความคุ้มค่า (ROI) ของ NIPT": `**การวิเคราะห์ความคุ้มค่าทางเศรษฐศาสตร์ (ROI) ของ NIPT**
**มิติทางคลินิกและระบบสุขภาพ:**
- ลดการตรวจ invasive ที่ไม่จำเป็น
- ลด false positive จากการคัดกรองแบบเดิม
- ลดภาระค่าใช้จ่ายต่อเนื่องจากการดูแลผู้ป่วยระยะยาว
- ลดการเจาะเลือดซ้ำ
- ลดภาระงานของระบบส่งต่อ
**ต้นทุนที่ต้องนำมาคำนวณ:**
- ค่าเครื่องมือและค่าเสื่อมราคา
- ค่าบุคลากรและ reagent
- ค่าเก็บและขนส่งตัวอย่าง
- ค่าควบคุมคุณภาพ
- ต้นทุนจาก no-call หรือ redraw rate
**ประโยชน์ที่วัดได้:**
- ปริมาณงานที่เพิ่มขึ้น
- TAT ที่สั้นลง
- ความสามารถรองรับบริการระดับประเทศ`,

        "การตรวจ NIPT ของ สปสช.": `**นโยบาย สปสช. กับการตรวจ NIPT**
**ขอบเขตที่ สปสช. สนับสนุน:**
โดยทั่วไปมุ่งเน้นการคัดกรองความผิดปกติของโครโมโซมกลุ่มหลัก ได้แก่:
- Trisomy 21 (Down syndrome)
- Trisomy 18 (Edwards syndrome)
- Trisomy 13 (Patau syndrome)
**กรณี Sex Chromosome Aneuploidy (SCA):**
ควรแยกเป็นประเด็นเฉพาะของการให้ข้อมูลและความยินยอม เนื่องจาก:
- ความซับซ้อนด้านการแปลผล
- ปัญหาด้านจริยธรรม
- อัตรา PPV ต่ำกว่ากลุ่ม autosomal trisomies โดยเฉพาะ monosomy X
**หากหน่วยบริการจะรายงาน SCA ควร:**
- ระบุขอบเขตบริการให้ชัดเจน
- ได้รับความยินยอมแบบเฉพาะเจาะจง
- มี genetic counseling รองรับอย่างครบถ้วน
📌 สำหรับข้อมูลล่าสุดเกี่ยวกับสิทธิ์ สปสช. ควรตรวจสอบกับโรงพยาบาลหรือ สปสช. โดยตรง`,

        "False positive และ false negative": `**ข้อจำกัดด้านความแม่นยำของ NIPT**
**False Positive (ผิดปกติแต่ทารกปกติ):**
- เกิดจาก confined placental mosaicism
- Maternal chromosomal abnormality
- Vanishing twin / Maternal malignancy
**False Negative (ปกติแต่ทารกผิดปกติ):**
- Fetal fraction ต่ำเกินไป
- Mosaicism ระดับต่ำ
- Rare variants บางชนิด
**อัตราโดยประมาณ:**
| ภาวะ | Sensitivity | Specificity |
|------|-------------|-------------|
| T21 | >99% | >99.9% |
| T18 | ~97% | >99.9% |
| T13 | ~90% | >99.9% |
⚠️ **สรุป:** NIPT ดีมากแต่ไม่ 100% — ผล "ปกติ" ไม่ได้รับประกัน 100%`,

          const builtIn = KNOWLEDGE_BASE[question];
          try {
            const systemPrompt = `คุณเป็น genetic counselor ผู้เชี่ยวชาญด้าน NIPT (Non-Invasive Prenatal Testing)\nให้คำปรึกษาเป็นภาษาไทยที่เข้าใจง่าย ชัดเจน และเห็นอกเห็นใจ\nใช้ข้อมูลทางการแพทย์ที่ถูกต้องและทันสมัย\nจัดรูปแบบคำตอบให้อ่านง่าย ใช้ bullet points และ emoji ที่เหมาะสม\nเสมอย้ำว่าควรปรึกษาแพทย์สำหรับกรณีเฉพาะบุคคล`;
            const userMsg = context ? `หัวข้อ: ${context}\nคำถาม: ${question}` : question;
            const res = await fetch("/api/chat", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                model: "claude-sonnet-4-6",
                max_tokens: 1000,
                system: systemPrompt,
                messages: [{ role: "user", content: userMsg }],
              }),
            });
            const data = await res.json();
            const text = data.content?.[0]?.text || "ไม่สามารถโหลดข้อมูลได้";
            setAiResponse(text);
            return text;
          } catch {
            const fallback = builtIn || "ขออภัย ไม่สามารถเชื่อมต่อได้ในขณะนี้ กรุณาลองใหม่อีกครั้ง";
            setAiResponse(fallback);
            return fallback;
          } finally {
            setIsLoading(false);
          }
        };

        const handleTopicSelect = async (topic) => {
          setSelectedTopic(topic);
          await getResponse(topic, selectedCategory);
        };

        const handleCustomQuestion = async () => {
          if (!customQuestion.trim()) return;
          const q = customQuestion;
          setCustomQuestion("");
          const answer = await getResponse(q);
          setChatHistory((prev) => [...prev, { q, a: answer }]);
        };

        const formatResponse = (text) => {
          if (!text) return null;
          return text.split("\n").map((line, i) => {
            if (line.startsWith("**") && line.endsWith("**")) {
              return <p key={i} style={{ fontWeight: "bold", color: "#81e6d9", marginTop: 12, marginBottom: 4 }}>{line.replace(/\*\*/g, "")}</p>;
            }
            if (line.includes("**")) {
              const parts = line.split(/\*\*(.*?)\*\*/g);
              return <p key={i} style={{ margin: "4px 0" }}>{parts.map((p, j) => j % 2 === 1 ? <strong key={j} style={{ color: "#81e6d9" }}>{p}</strong> : p)}</p>;
            }
            if (line.startsWith("- ") || line.startsWith("• ")) {
              return <li key={i} style={{ marginLeft: 16, margin: "2px 0" }}>{line.slice(2)}</li>;
            }
            if (line.trim() === "") return <br key={i} />;
            return <p key={i} style={{ margin: "4px 0" }}>{line}</p>;
          });
        };

        const quickAccess = [
          "NIPT คืออะไร",
          "Genetic counselor คืออะไร",
          "พื้นฐานชีววิทยา: fetal fraction และ cell-free DNA",
          "ผล High Risk หมายความว่าอะไร",
          "ตรวจได้ตั้งแต่กี่สัปดาห์",
        ];

        return (
          <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%)", fontFamily: "'Georgia', serif", color: "#e2e8f0" }}>
            {/* Header */}
            <div style={{ background: "rgba(0,0,0,0.4)", borderBottom: "1px solid rgba(56,178,172,0.3)", padding: "20px 24px" }}>
              <div style={{ maxWidth: 900, margin: "0 auto" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontSize: 36 }}>🧬</span>
                  <div>
                    <h1 style={{ fontSize: 22, fontWeight: "bold", color: "#81e6d9", margin: 0, letterSpacing: 1 }}>NIPT Genetic Counselling</h1>
                    <p style={{ fontSize: 13, color: "#90cdf4", margin: 0 }}>ระบบให้คำปรึกษาการตรวจคัดกรองโครโมโซมทารกในครรภ์</p>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
                  {["guided", "chat"].map((tab) => (
                    <button key={tab} onClick={() => setActiveTab(tab)} style={{ padding: "8px 20px", borderRadius: 20, border: "none", cursor: "pointer", fontSize: 13, fontWeight: "bold", background: activeTab === tab ? "linear-gradient(135deg, #319795, #2b6cb0)" : "rgba(255,255,255,0.1)", color: activeTab === tab ? "#fff" : "#a0aec0", transition: "all 0.2s" }}>
                      {tab === "guided" ? "📋 เมนูหัวข้อ" : "💬 ถามอิสระ"}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            <div style={{ maxWidth: 900, margin: "0 auto", padding: "24px 16px" }}>
              {activeTab === "guided" && (
                <div style={{ display: "grid", gridTemplateColumns: "300px 1fr", gap: 20 }}>
                  {/* Left Panel */}
                  <div>
                    <div style={{ marginBottom: 16 }}>
                      <label style={{ fontSize: 12, color: "#90cdf4", display: "block", marginBottom: 6 }}>เลือกหมวดหมู่</label>
                      <select value={selectedCategory} onChange={(e) => { setSelectedCategory(e.target.value); setSelectedTopic(""); setAiResponse(""); }} style={{ width: "100%", padding: "10px 12px", background: "rgba(0,0,0,0.4)", border: "1px solid rgba(56,178,172,0.4)", borderRadius: 8, color: "#e2e8f0", fontSize: 14, cursor: "pointer" }}>
                        <option value="">-- เลือกหมวดหมู่ --</option>
                        {Object.keys(TOPICS).map((cat) => (
                          <option key={cat} value={cat}>{TOPICS[cat].icon} {cat}</option>
                        ))}
                      </select>
                    </div>
                    {selectedCategory && (
                      <div>
                        <label style={{ fontSize: 12, color: "#90cdf4", display: "block", marginBottom: 8 }}>เลือกหัวข้อย่อย</label>
                        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                          {TOPICS[selectedCategory].subtopics.map((topic) => (
                            <button key={topic} onClick={() => handleTopicSelect(topic)} style={{ padding: "9px 12px", background: selectedTopic === topic ? "linear-gradient(135deg, #2c7a7b, #2b6cb0)" : "rgba(255,255,255,0.06)", border: selectedTopic === topic ? "1px solid #81e6d9" : "1px solid rgba(255,255,255,0.1)", borderRadius: 8, color: selectedTopic === topic ? "#e6fffa" : "#cbd5e0", fontSize: 13, textAlign: "left", cursor: "pointer" }}>
                              {topic}
                            </button>
                          ))}
                        </div>
                      </div>
                    )}
                    {!selectedCategory && (
                      <div>
                        <p style={{ fontSize: 12, color: "#90cdf4", marginBottom: 10 }}>🔖 เข้าถึงด่วน</p>
                        {quickAccess.map((q) => (
                          <button key={q} onClick={() => handleTopicSelect(q)} style={{ display: "block", width: "100%", padding: "8px 10px", marginBottom: 6, background: "rgba(56,178,172,0.1)", border: "1px solid rgba(56,178,172,0.2)", borderRadius: 8, color: "#81e6d9", fontSize: 12, textAlign: "left", cursor: "pointer" }}>
                            → {q}
                          </button>
                        ))}
                      </div>
                    )}
                  </div>

                  {/* Right Panel */}
                  <div style={{ background: "rgba(0,0,0,0.3)", border: "1px solid rgba(56,178,172,0.2)", borderRadius: 12, padding: 20, minHeight: 400 }}>
                    {isLoading && (
                      <div style={{ textAlign: "center", paddingTop: 80 }}>
                        <div style={{ width: 40, height: 40, border: "3px solid rgba(56,178,172,0.3)", borderTop: "3px solid #81e6d9", borderRadius: "50%", animation: "spin 1s linear infinite", margin: "0 auto 16px" }} />
                        <p style={{ color: "#81e6d9", fontSize: 14 }}>กำลังค้นหาข้อมูล...</p>
                        <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
                      </div>
                    )}
                    {!isLoading && !aiResponse && (
                      <div style={{ textAlign: "center", paddingTop: 60, color: "#718096" }}>
                        <p style={{ fontSize: 40 }}>🧬</p>
                        <p style={{ fontSize: 15 }}>เลือกหมวดหมู่และหัวข้อ</p>
                        <p style={{ fontSize: 13 }}>เพื่อเริ่มการให้คำปรึกษา NIPT</p>
                      </div>
                    )}
                    {!isLoading && aiResponse && (
                      <div>
                        <div style={{ background: "rgba(56,178,172,0.1)", border: "1px solid rgba(56,178,172,0.3)", borderRadius: 8, padding: "8px 14px", marginBottom: 16, fontSize: 13, color: "#81e6d9" }}>
                          📌 {selectedTopic}
                        </div>
                        <div style={{ fontSize: 14, lineHeight: 1.8, color: "#e2e8f0" }}>
                          {formatResponse(aiResponse)}
                        </div>
                        <div style={{ marginTop: 20, padding: "10px 14px", background: "rgba(237,137,54,0.1)", border: "1px solid rgba(237,137,54,0.3)", borderRadius: 8, fontSize: 12, color: "#fbd38d" }}>
                          ⚕️ ข้อมูลนี้เพื่อการศึกษา ควรปรึกษาแพทย์หรือ genetic counselor สำหรับกรณีเฉพาะบุคคล
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {activeTab === "chat" && (
                <div>
                  <div style={{ background: "rgba(0,0,0,0.3)", border: "1px solid rgba(56,178,172,0.2)", borderRadius: 12, padding: 20, minHeight: 300, maxHeight: 420, overflowY: "auto", marginBottom: 16 }}>
                    {chatHistory.length === 0 && !isLoading && (
                      <div style={{ textAlign: "center", color: "#718096", paddingTop: 60 }}>
                        <p style={{ fontSize: 32 }}>💬</p>
                        <p>พิมพ์คำถามด้านล่างเพื่อเริ่มการสนทนา</p>
                        <p style={{ fontSize: 13 }}>ตัวอย่าง: "fetal fraction ต่ำมีผลอย่างไรต่อ NIPT?"</p>
                      </div>
                    )}
                    {chatHistory.map((item, i) => (
                      <div key={i} style={{ marginBottom: 20 }}>
                        <div style={{ background: "rgba(56,178,172,0.15)", borderRadius: "12px 12px 4px 12px", padding: "10px 14px", marginBottom: 8, fontSize: 14, color: "#e6fffa", marginLeft: "20%" }}>{item.q}</div>
                        <div style={{ background: "rgba(255,255,255,0.05)", borderRadius: "4px 12px 12px 12px", padding: "10px 14px", fontSize: 14, lineHeight: 1.8, marginRight: "10%" }}>{formatResponse(item.a)}</div>
                      </div>
                    ))}
                    {isLoading && (
                      <div style={{ display: "flex", gap: 6, padding: 10 }}>
                        {[0,1,2].map((i) => <div key={i} style={{ width: 8, height: 8, background: "#81e6d9", borderRadius: "50%", animation: `bounce 1s ease-in-out ${i * 0.2}s infinite` }} />)}
                        <style>{`@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }`}</style>
                      </div>
                    )}
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
                    {[
                      "fetal fraction ต่ำมีผลอย่างไร?",
                      "Genetic counselor ต่างจากแพทย์ทั่วไปอย่างไร?",
                      "ผล No Call ต้องทำอะไรต่อ?",
                      "PPV แปลว่าอะไรในทางปฏิบัติ?",
                    ].map((q) => (
                      <button key={q} onClick={() => setCustomQuestion(q)} style={{ padding: "6px 12px", background: "rgba(56,178,172,0.1)", border: "1px solid rgba(56,178,172,0.3)", borderRadius: 20, color: "#81e6d9", fontSize: 12, cursor: "pointer" }}>{q}</button>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 10 }}>
                    <input value={customQuestion} onChange={(e) => setCustomQuestion(e.target.value)} onKeyDown={(e) => e.key === "Enter" && handleCustomQuestion()} placeholder="พิมพ์คำถามเกี่ยวกับ NIPT..." style={{ flex: 1, padding: "12px 16px", background: "rgba(0,0,0,0.4)", border: "1px solid rgba(56,178,172,0.4)", borderRadius: 10, color: "#e2e8f0", fontSize: 14, outline: "none" }} />
                    <button onClick={handleCustomQuestion} disabled={isLoading || !customQuestion.trim()} style={{ padding: "12px 20px", background: isLoading ? "rgba(56,178,172,0.3)" : "linear-gradient(135deg, #319795, #2b6cb0)", border: "none", borderRadius: 10, color: "#fff", fontSize: 14, cursor: isLoading ? "not-allowed" : "pointer", fontWeight: "bold" }}>ส่ง →</button>
                  </div>
                </div>
              )}

              <div style={{ marginTop: 24, padding: "12px 16px", background: "rgba(0,0,0,0.2)", borderRadius: 8, fontSize: 11, color: "#718096", textAlign: "center" }}>
                ข้อมูลนี้จัดทำเพื่อการศึกษาและเป็นแนวทางเบื้องต้นเท่านั้น ไม่สามารถทดแทนการปรึกษาแพทย์หรือ genetic counselor ที่มีใบอนุญาต
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<NIPTCounsellingApp />);
    </script>
  </body>
</html>
