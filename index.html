<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NIPT Genetic Counselling</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body style="margin:0;padding:0;">
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      const TOPICS = {
        "ความหมายของ NIPT": {
          icon: "🧬",
          subtopics: [
            "NIPT คืออะไร",
            "หลักการทำงานของ NIPT",
            "ความแตกต่างจาก invasive testing",
            "ข้อบ่งชี้ในการตรวจ NIPT",
          ],
        },
        "การแปลผล NIPT": {
          icon: "📊",
          subtopics: [
            "ผล High Risk หมายความว่าอะไร",
            "ผล Low Risk หมายความว่าอะไร",
            "ผล No Call / Failed",
            "PPV และ NPV คืออะไร",
            "ความแม่นยำของการตรวจ",
          ],
        },
        "โครโมโซมที่ตรวจพบ": {
          icon: "🔬",
          subtopics: [
            "Trisomy 21 (Down syndrome)",
            "Trisomy 18 (Edwards syndrome)",
            "Trisomy 13 (Patau syndrome)",
            "Sex chromosome aneuploidies",
            "Microdeletions",
            "Rare autosomal trisomies",
          ],
        },
        "ขั้นตอนหลังผลผิดปกติ": {
          icon: "🏥",
          subtopics: [
            "ควรทำอะไรต่อเมื่อผล High Risk",
            "Amniocentesis คืออะไร",
            "CVS คืออะไร",
            "การตัดสินใจหลังการตรวจยืนยัน",
            "การส่งต่อผู้เชี่ยวชาญ",
          ],
        },
        "ข้อจำกัดของ NIPT": {
          icon: "⚠️",
          subtopics: [
            "False positive และ false negative",
            "Vanishing twin syndrome",
            "Confined placental mosaicism",
            "Maternal malignancy",
            "กรณีที่ NIPT ไม่เหมาะสม",
          ],
        },
        "คำถามที่พบบ่อย": {
          icon: "❓",
          subtopics: [
            "ตรวจได้ตั้งแต่กี่สัปดาห์",
            "ครรภ์แฝดตรวจได้หรือไม่",
            "IVF มีผลต่อการตรวจหรือไม่",
            "ผล NIPT บอกเพศทารกได้หรือไม่",
            "ค่าใช้จ่ายและการเบิกจ่าย",
          ],
        },
      };

      const KNOWLEDGE_BASE = {
        "NIPT คืออะไร": `NIPT (Non-Invasive Prenatal Testing) คือการตรวจคัดกรองโครโมโซมของทารกในครรภ์ โดยการวิเคราะห์ cell-free fetal DNA (cffDNA) ที่ลอยอยู่ในกระแสเลือดมารดา\n**วิธีการตรวจ:** เจาะเลือดมารดาเพียง 10 ml ไม่มีความเสี่ยงต่อทารก\n**สามารถตรวจพบ:**\n- Trisomy 21, 18, 13\n- Sex chromosome abnormalities\n- บางแพ็กเกจรวม microdeletions\n**ช่วงเวลาที่เหมาะสม:** ตั้งแต่อายุครรภ์ 10 สัปดาห์ขึ้นไป\n⚠️ **สำคัญ:** NIPT เป็น screening test ไม่ใช่ diagnostic test ผลผิดปกติต้องยืนยันด้วย invasive testing`,
        "ผล High Risk หมายความว่าอะไร": `ผล **High Risk** หมายความว่า พบสัญญาณของ chromosomal abnormality ในตัวอย่างเลือด\n**สิ่งที่ต้องเข้าใจ:**\n- ❌ ไม่ได้หมายความว่าทารกผิดปกติแน่นอน\n- ✅ หมายความว่าควรตรวจยืนยันด้วย invasive testing\n**Positive Predictive Value (PPV):**\n- Trisomy 21: PPV ~90% (ขึ้นกับอายุมารดา)\n- Trisomy 18: PPV ~70-80%\n- Trisomy 13: PPV ~40-50%\n**ขั้นตอนต่อไป:**\n1. พบแพทย์เพื่อปรึกษาผล\n2. พิจารณา amniocentesis หรือ CVS\n3. รับคำปรึกษาจาก genetic counselor\n💙 ผล high risk ก่อให้เกิดความวิตกกังวล — ควรขอความช่วยเหลือด้านจิตใจด้วย`,
        "Trisomy 21 (Down syndrome)": `**Down Syndrome (Trisomy 21)**\n**พันธุกรรม:** โครโมโซมคู่ที่ 21 เกินมา 1 แท่ง (47 แท่งแทน 46 แท่ง)\n**ความถี่:** ~1/700 การคลอด (เพิ่มตามอายุมารดา)\n**ลักษณะทางคลินิก:**\n- ระดับสติปัญญาต่ำกว่าปกติ (mild-moderate)\n- ลักษณะหน้าตาเฉพาะ\n- โรคหัวใจพิการแต่กำเนิด ~40-50%\n- ความเสี่ยงต่อมะเร็งเม็ดเลือดขาวสูงขึ้น\n**อายุขัย:** ปัจจุบันมักมีชีวิตยืนยาวถึง 60+ ปี\n**NIPT Sensitivity:** >99% | **Specificity:** >99.9%\n📌 การวินิจฉัยยืนยันต้องทำ karyotype จาก amniocentesis หรือ CVS`,
        "Amniocentesis คืออะไร": `**Amniocentesis** คือการเจาะดูดน้ำคร่ำเพื่อตรวจโครโมโซมทารก\n**วิธีการ:**\n- ใช้เข็มเจาะผ่านหน้าท้องมารดาภายใต้ ultrasound guidance\n- ดูดน้ำคร่ำ ~15-20 ml\n- ส่งตรวจ karyotype / microarray / FISH\n**เวลาที่เหมาะ:** อายุครรภ์ 15-20 สัปดาห์\n**ผลการตรวจ:**\n- Karyotype: 2-3 สัปดาห์\n- FISH/QF-PCR: 2-3 วัน (โครโมโซมหลัก)\n**ความเสี่ยง:**\n- แท้งบัตร ~0.1-0.3% (1/500-1000)\n- Infection, bleeding (พบน้อยมาก)\n**ความแม่นยำ:** ~99.5% สำหรับ chromosomal abnormalities`,
        "ตรวจได้ตั้งแต่กี่สัปดาห์": `**ช่วงเวลาที่เหมาะสมสำหรับ NIPT**\n**อายุครรภ์ขั้นต่ำ:** 10 สัปดาห์ (บางแล็บ 9 สัปดาห์)\n**เหตุผล:** ต้องการ fetal fraction ≥4% จึงจะแปลผลได้น่าเชื่อถือ\n- Fetal fraction เพิ่มขึ้นตามอายุครรภ์\n- ที่ 10 สัปดาห์: fetal fraction ~10%\n- ที่ 20 สัปดาห์: fetal fraction ~20%\n**ช่วงที่ดีที่สุด:** 10-13 สัปดาห์ (ร่วมกับ first trimester screening)\n**กรณี No Call:** อาจเกิดจาก fetal fraction ต่ำเกินไป ควรตรวจซ้ำหลัง 2 สัปดาห์\n**ไม่มีอายุครรภ์สูงสุด** — ตรวจได้ตลอดการตั้งครรภ์`,
        "False positive และ false negative": `**ข้อจำกัดด้านความแม่นยำของ NIPT**\n**False Positive (ผิดปกติแต่ทารกปกติ):**\n- เกิดจาก confined placental mosaicism\n- Maternal chromosomal abnormality\n- Vanishing twin\n- Maternal malignancy\n**False Negative (ปกติแต่ทารกผิดปกติ):**\n- Fetal fraction ต่ำเกินไป\n- Mosaicism ระดับต่ำ\n- Rare variants บางชนิด\n⚠️ **สรุป:** NIPT ดีมากแต่ไม่ 100% — ผล "ปกติ" ไม่ได้รับประกัน 100%`,
      };

      function NIPTCounsellingApp() {
        const [selectedCategory, setSelectedCategory] = useState("");
        const [selectedTopic, setSelectedTopic] = useState("");
        const [aiResponse, setAiResponse] = useState("");
        const [isLoading, setIsLoading] = useState(false);
        const [customQuestion, setCustomQuestion] = useState("");
        const [chatHistory, setChatHistory] = useState([]);
        const [activeTab, setActiveTab] = useState("guided");

        const getResponse = async (question, context = "") => {
          setIsLoading(true);
          setAiResponse("");
          const builtIn = KNOWLEDGE_BASE[question];
          try {
            const systemPrompt = `คุณเป็น genetic counselor ผู้เชี่ยวชาญด้าน NIPT (Non-Invasive Prenatal Testing)\nให้คำปรึกษาเป็นภาษาไทยที่เข้าใจง่าย ชัดเจน และเห็นอกเห็นใจ\nใช้ข้อมูลทางการแพทย์ที่ถูกต้องและทันสมัย\nจัดรูปแบบคำตอบให้อ่านง่าย ใช้ bullet points และ emoji ที่เหมาะสม\nเสมอย้ำว่าควรปรึกษาแพทย์สำหรับกรณีเฉพาะบุคคล`;
            const userMsg = context ? `หัวข้อ: ${context}\nคำถาม: ${question}` : question;
            const res = await fetch("/api/chat", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 1000,
                system: systemPrompt,
                messages: [{ role: "user", content: userMsg }],
              }),
            });
            const data = await res.json();
            const text = data.content?.[0]?.text || "ไม่สามารถโหลดข้อมูลได้";
            setAiResponse(text);
            return text;
          } catch {
            const fallback = builtIn || "ขออภัย ไม่สามารถเชื่อมต่อได้ในขณะนี้ กรุณาลองใหม่อีกครั้ง";
            setAiResponse(fallback);
            return fallback;
          } finally {
            setIsLoading(false);
          }
        };

        const handleTopicSelect = async (topic) => {
          setSelectedTopic(topic);
          await getResponse(topic, selectedCategory);
        };

        const handleCustomQuestion = async () => {
          if (!customQuestion.trim()) return;
          const q = customQuestion;
          setCustomQuestion("");
          const answer = await getResponse(q);
          setChatHistory((prev) => [...prev, { q, a: answer }]);
        };

        const formatResponse = (text) => {
          if (!text) return null;
          return text.split("\n").map((line, i) => {
            if (line.startsWith("**") && line.endsWith("**")) {
              return <p key={i} style={{ fontWeight: "bold", color: "#81e6d9", marginTop: 12, marginBottom: 4 }}>{line.replace(/\*\*/g, "")}</p>;
            }
            if (line.includes("**")) {
              const parts = line.split(/\*\*(.*?)\*\*/g);
              return <p key={i} style={{ margin: "4px 0" }}>{parts.map((p, j) => j % 2 === 1 ? <strong key={j} style={{ color: "#81e6d9" }}>{p}</strong> : p)}</p>;
            }
            if (line.startsWith("- ") || line.startsWith("• ")) {
              return <li key={i} style={{ marginLeft: 16, margin: "2px 0" }}>{line.slice(2)}</li>;
            }
            if (line.trim() === "") return <br key={i} />;
            return <p key={i} style={{ margin: "4px 0" }}>{line}</p>;
          });
        };

        return (
          <div style={{ minHeight: "100vh", background: "linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%)", fontFamily: "'Georgia', serif", color: "#e2e8f0" }}>
            {/* Header */}
            <div style={{ background: "rgba(0,0,0,0.4)", borderBottom: "1px solid rgba(56,178,172,0.3)", padding: "20px 24px" }}>
              <div style={{ maxWidth: 860, margin: "0 auto" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontSize: 36 }}>🧬</span>
                  <div>
                    <h1 style={{ fontSize: 22, fontWeight: "bold", color: "#81e6d9", margin: 0, letterSpacing: 1 }}>NIPT Genetic Counselling</h1>
                    <p style={{ fontSize: 13, color: "#90cdf4", margin: 0 }}>ระบบให้คำปรึกษาการตรวจคัดกรองโครโมโซมทารกในครรภ์</p>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 8, marginTop: 16 }}>
                  {["guided", "chat"].map((tab) => (
                    <button key={tab} onClick={() => setActiveTab(tab)} style={{ padding: "8px 20px", borderRadius: 20, border: "none", cursor: "pointer", fontSize: 13, fontWeight: "bold", background: activeTab === tab ? "linear-gradient(135deg, #319795, #2b6cb0)" : "rgba(255,255,255,0.1)", color: activeTab === tab ? "#fff" : "#a0aec0", transition: "all 0.2s" }}>
                      {tab === "guided" ? "📋 เมนูหัวข้อ" : "💬 ถามอิสระ"}
                    </button>
                  ))}
                </div>
              </div>
            </div>

            <div style={{ maxWidth: 860, margin: "0 auto", padding: "24px 16px" }}>
              {activeTab === "guided" && (
                <div style={{ display: "grid", gridTemplateColumns: "280px 1fr", gap: 20 }}>
                  {/* Left Panel */}
                  <div>
                    <div style={{ marginBottom: 16 }}>
                      <label style={{ fontSize: 12, color: "#90cdf4", display: "block", marginBottom: 6 }}>เลือกหมวดหมู่</label>
                      <select value={selectedCategory} onChange={(e) => { setSelectedCategory(e.target.value); setSelectedTopic(""); setAiResponse(""); }} style={{ width: "100%", padding: "10px 12px", background: "rgba(0,0,0,0.4)", border: "1px solid rgba(56,178,172,0.4)", borderRadius: 8, color: "#e2e8f0", fontSize: 14, cursor: "pointer" }}>
                        <option value="">-- เลือกหมวดหมู่ --</option>
                        {Object.keys(TOPICS).map((cat) => (
                          <option key={cat} value={cat}>{TOPICS[cat].icon} {cat}</option>
                        ))}
                      </select>
                    </div>
                    {selectedCategory && (
                      <div>
                        <label style={{ fontSize: 12, color: "#90cdf4", display: "block", marginBottom: 8 }}>เลือกหัวข้อย่อย</label>
                        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                          {TOPICS[selectedCategory].subtopics.map((topic) => (
                            <button key={topic} onClick={() => handleTopicSelect(topic)} style={{ padding: "9px 12px", background: selectedTopic === topic ? "linear-gradient(135deg, #2c7a7b, #2b6cb0)" : "rgba(255,255,255,0.06)", border: selectedTopic === topic ? "1px solid #81e6d9" : "1px solid rgba(255,255,255,0.1)", borderRadius: 8, color: selectedTopic === topic ? "#e6fffa" : "#cbd5e0", fontSize: 13, textAlign: "left", cursor: "pointer" }}>
                              {topic}
                            </button>
                          ))}
                        </div>
                      </div>
                    )}
                    {!selectedCategory && (
                      <div>
                        <p style={{ fontSize: 12, color: "#90cdf4", marginBottom: 10 }}>🔖 เข้าถึงด่วน</p>
                        {["NIPT คืออะไร", "ผล High Risk หมายความว่าอะไร", "ตรวจได้ตั้งแต่กี่สัปดาห์"].map((q) => (
                          <button key={q} onClick={() => handleTopicSelect(q)} style={{ display: "block", width: "100%", padding: "8px 10px", marginBottom: 6, background: "rgba(56,178,172,0.1)", border: "1px solid rgba(56,178,172,0.2)", borderRadius: 8, color: "#81e6d9", fontSize: 12, textAlign: "left", cursor: "pointer" }}>
                            → {q}
                          </button>
                        ))}
                      </div>
                    )}
                  </div>

                  {/* Right Panel */}
                  <div style={{ background: "rgba(0,0,0,0.3)", border: "1px solid rgba(56,178,172,0.2)", borderRadius: 12, padding: 20, minHeight: 400 }}>
                    {isLoading && (
                      <div style={{ textAlign: "center", paddingTop: 80 }}>
                        <div style={{ width: 40, height: 40, border: "3px solid rgba(56,178,172,0.3)", borderTop: "3px solid #81e6d9", borderRadius: "50%", animation: "spin 1s linear infinite", margin: "0 auto 16px" }} />
                        <p style={{ color: "#81e6d9", fontSize: 14 }}>กำลังค้นหาข้อมูล...</p>
                        <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
                      </div>
                    )}
                    {!isLoading && !aiResponse && (
                      <div style={{ textAlign: "center", paddingTop: 60, color: "#718096" }}>
                        <p style={{ fontSize: 40 }}>🧬</p>
                        <p style={{ fontSize: 15 }}>เลือกหมวดหมู่และหัวข้อ</p>
                        <p style={{ fontSize: 13 }}>เพื่อเริ่มการให้คำปรึกษา NIPT</p>
                      </div>
                    )}
                    {!isLoading && aiResponse && (
                      <div>
                        <div style={{ background: "rgba(56,178,172,0.1)", border: "1px solid rgba(56,178,172,0.3)", borderRadius: 8, padding: "8px 14px", marginBottom: 16, fontSize: 13, color: "#81e6d9" }}>
                          📌 {selectedTopic}
                        </div>
                        <div style={{ fontSize: 14, lineHeight: 1.8, color: "#e2e8f0" }}>
                          {formatResponse(aiResponse)}
                        </div>
                        <div style={{ marginTop: 20, padding: "10px 14px", background: "rgba(237,137,54,0.1)", border: "1px solid rgba(237,137,54,0.3)", borderRadius: 8, fontSize: 12, color: "#fbd38d" }}>
                          ⚕️ ข้อมูลนี้เพื่อการศึกษา ควรปรึกษาแพทย์หรือ genetic counselor สำหรับกรณีเฉพาะบุคคล
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {activeTab === "chat" && (
                <div>
                  <div style={{ background: "rgba(0,0,0,0.3)", border: "1px solid rgba(56,178,172,0.2)", borderRadius: 12, padding: 20, minHeight: 300, maxHeight: 420, overflowY: "auto", marginBottom: 16 }}>
                    {chatHistory.length === 0 && !isLoading && (
                      <div style={{ textAlign: "center", color: "#718096", paddingTop: 60 }}>
                        <p style={{ fontSize: 32 }}>💬</p>
                        <p>พิมพ์คำถามด้านล่างเพื่อเริ่มการสนทนา</p>
                        <p style={{ fontSize: 13 }}>ตัวอย่าง: "NIPT ต่างจาก quad screen อย่างไร?"</p>
                      </div>
                    )}
                    {chatHistory.map((item, i) => (
                      <div key={i} style={{ marginBottom: 20 }}>
                        <div style={{ background: "rgba(56,178,172,0.15)", borderRadius: "12px 12px 4px 12px", padding: "10px 14px", marginBottom: 8, fontSize: 14, color: "#e6fffa", marginLeft: "20%" }}>{item.q}</div>
                        <div style={{ background: "rgba(255,255,255,0.05)", borderRadius: "4px 12px 12px 12px", padding: "10px 14px", fontSize: 14, lineHeight: 1.8, marginRight: "10%" }}>{formatResponse(item.a)}</div>
                      </div>
                    ))}
                    {isLoading && (
                      <div style={{ display: "flex", gap: 6, padding: 10 }}>
                        {[0,1,2].map((i) => <div key={i} style={{ width: 8, height: 8, background: "#81e6d9", borderRadius: "50%", animation: `bounce 1s ease-in-out ${i * 0.2}s infinite` }} />)}
                        <style>{`@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }`}</style>
                      </div>
                    )}
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 12 }}>
                    {["NIPT กับ quad screen ต่างกันอย่างไร?", "ครรภ์ IVF ตรวจ NIPT ได้หรือไม่?", "ผล No Call หมายความว่าอะไร?"].map((q) => (
                      <button key={q} onClick={() => setCustomQuestion(q)} style={{ padding: "6px 12px", background: "rgba(56,178,172,0.1)", border: "1px solid rgba(56,178,172,0.3)", borderRadius: 20, color: "#81e6d9", fontSize: 12, cursor: "pointer" }}>{q}</button>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 10 }}>
                    <input value={customQuestion} onChange={(e) => setCustomQuestion(e.target.value)} onKeyDown={(e) => e.key === "Enter" && handleCustomQuestion()} placeholder="พิมพ์คำถามเกี่ยวกับ NIPT..." style={{ flex: 1, padding: "12px 16px", background: "rgba(0,0,0,0.4)", border: "1px solid rgba(56,178,172,0.4)", borderRadius: 10, color: "#e2e8f0", fontSize: 14, outline: "none" }} />
                    <button onClick={handleCustomQuestion} disabled={isLoading || !customQuestion.trim()} style={{ padding: "12px 20px", background: isLoading ? "rgba(56,178,172,0.3)" : "linear-gradient(135deg, #319795, #2b6cb0)", border: "none", borderRadius: 10, color: "#fff", fontSize: 14, cursor: isLoading ? "not-allowed" : "pointer", fontWeight: "bold" }}>ส่ง →</button>
                  </div>
                </div>
              )}

              <div style={{ marginTop: 24, padding: "12px 16px", background: "rgba(0,0,0,0.2)", borderRadius: 8, fontSize: 11, color: "#718096", textAlign: "center" }}>
                ข้อมูลนี้จัดทำเพื่อการศึกษาและเป็นแนวทางเบื้องต้นเท่านั้น ไม่สามารถทดแทนการปรึกษาแพทย์หรือ genetic counselor ที่มีใบอนุญาต
              </div>
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<NIPTCounsellingApp />);
    </script>
  </body>
